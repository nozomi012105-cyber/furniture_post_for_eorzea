<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Furniture Post for Eorzea</title>
    <style>
        /* --- 1. あなたのスタイルを完全継承 --- */
        :root {
            --bg-color: #f0e1bd;
            --card-bg: #f5f5f5;
            --card-hover-bg: #ffffff;
            --text-main: #555555;
            --text-accent: #7d6b5d;
            --text-light: #888888;
            --color-new: #a4343a;
            --shadow: 0 8px 18px rgba(90, 70, 50, 0.15);
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            margin: 0;
            padding-top: 170px;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", sans-serif;
            color: var(--text-main);
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* --- ヘッダー・検索・トグル --- */
        header {
            position: fixed; top: 0; left: 0; width: 100%;
            background-color: rgba(240, 225, 189, 0.96);
            backdrop-filter: blur(8px); z-index: 1000;
            padding: 10px 15px; box-shadow: 0 2px 10px rgba(90, 70, 50, 0.05);
            text-align: center;
        }
        header h1 { font-size: 1.1rem; color: var(--text-accent); margin: 0 0 8px 0; letter-spacing: 1px; }
        .top-controls { display: flex; align-items: center; gap: 8px; max-width: 500px; margin: 0 auto 10px; }
        .search-input {
            width: 100%; padding: 8px 15px; border-radius: 20px;
            border: 1px solid rgba(125, 107, 93, 0.2); background-color: var(--card-bg);
            outline: none; font-size: 17px; transition: 0.3s;
        }
        .search-input::placeholder { font-size: 13px; color: rgba(125, 107, 93, 0.6); letter-spacing: 0.5px; }

        /* --- 切り替え --- */
        .smooth-toggle {
            width: 185px; height: 32px; background-color: rgba(125, 107, 93, 0.15);
            border-radius: 16px; position: relative; cursor: pointer; user-select: none;
            display: flex; align-items: center; border: 1px solid rgba(125, 107, 93, 0.05);
        }
        .slider {
            position: absolute; top: 1px; left: 2px; width: 63px; height: 28px;
            background-color: #ffffff; border-radius: 14px;
            box-shadow: 0 2px 6px rgba(90, 70, 50, 0.1);
            transition: transform 0.4s cubic-bezier(0.65, 0, 0.35, 1); z-index: 1;
        }
        .toggle-label { flex: 1; font-size: 0.65rem; font-weight: bold; color: var(--text-accent); z-index: 2; pointer-events: none; }
        .mode-patch .slider { transform: translateX(63px); }

        /* --- 絞り込みUI --- */
        .filter-scroll { display: flex; overflow-x: auto; white-space: nowrap; gap: 8px; padding: 5px 0; justify-content: center; scrollbar-width: none; }
        .filter-scroll::-webkit-scrollbar { display: none; }
        .filter-chip {
            padding: 6px 14px; background-color: rgba(125, 107, 93, 0.18); 
            border: 1px solid rgba(125, 107, 93, 0.1); border-radius: 15px;
            font-size: 0.7rem; font-weight: bold; color: var(--text-accent); 
            cursor: pointer; transition: all 0.2s ease;
        }
        .filter-chip.active { background-color: var(--text-accent); color: #ffffff; }

        #subMenu { display: none; margin-top: 5px; justify-content: safe center; animation: cardArrive 0.3s ease; }
        #subMenu .filter-chip { padding: 3px 10px; font-size: 0.65rem; background-color: rgba(68, 68, 68, 0.05); border: 1px solid rgba(125, 107, 93, 0.3); }
        #subMenu .filter-chip.active { background-color: rgba(125, 107, 93, 0.1); color: var(--text-accent); border-color: var(--text-accent); }

        /* --- グリッドとカード --- */
        .catalog-container { max-width: 1100px; margin: 0 auto; padding: 15px; }
        .catalog-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        @media (min-width: 600px) {
            .catalog-grid { grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 20px; }
            body { padding-top: 190px; }
        }

        .cheki-card {
            background-color: var(--card-bg); padding: 14px 14px 24px 14px;
            border-radius: 10px; box-shadow: var(--shadow);
            position: relative; cursor: pointer; transition: 0.3s;
            animation: cardArrive 0.6s ease forwards;
        }
        .cheki-card:hover { transform: translateY(-5px); background-color: var(--card-hover-bg); }
        .photo-area { width: 100%; aspect-ratio: 1/1; background-color: #ddd; border-radius: 6px; overflow: hidden; margin-bottom: 12px; }
        .photo-area img { width: 100%; height: 100%; object-fit: cover; }
        .item-name { font-size: 0.8rem; font-weight: 600; text-align: center; color: var(--text-accent); margin: 0; }
        .new-seal {
            position: absolute; top: -10px; left: -10px; width: 40px; height: 40px;
            background-color: var(--color-new); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #ffffff; font-size: 0.7rem; font-weight: bold;
            transform: rotate(-15deg); box-shadow: 0 4px 8px rgba(164, 52, 58, 0.3); z-index: 10;
        }

        .patch-divider { grid-column: 1 / -1; display: flex; align-items: center; margin: 30px 0 10px 0; }
        .patch-label { font-size: 0.75rem; font-weight: bold; color: var(--text-accent); background: rgba(255,255,255,0.5); padding: 3px 12px; border-radius: 12px; border: 1.5px dashed var(--text-accent); }

        /* --- 本のモーダル（復元・固定） --- */
        .modal {
            display: none; position: fixed; z-index: 2000;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            align-items: center; justify-content: center;
        }
        .modal.visible { display: flex; }
        .book-layout {
            display: flex; width: 95%; max-width: 850px; height: 500px;
            background: #fdfaf3; border-radius: 10px; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            overflow: hidden; position: relative;
        }
        .book-left { flex: 1.2; background: #1a1a1a; display: flex; align-items: center; justify-content: center; position: relative; }
        .book-right { flex: 1; padding: 30px; display: flex; flex-direction: column; justify-content: space-between; border-left: 1px solid rgba(125,107,93,0.2); }
        .main-photo img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .tag { font-size: 0.7rem; background: rgba(125, 107, 93, 0.1); padding: 2px 8px; border-radius: 4px; margin-right: 5px; }
        .spec-item { display: flex; justify-content: space-between; margin-bottom: 8px; border-bottom: 1px dotted #ccc; }
        .comment-box { margin-top: 15px; font-size: 0.85rem; line-height: 1.6; color: #666; background: rgba(255,255,255,0.5); padding: 10px; border-radius: 5px; }
        
        .close-modal { position: absolute; top: 10px; right: 20px; color: #555; font-size: 35px; cursor: pointer; z-index: 2100; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.1); color: white; border: none; width: 50px; height: 80px; font-size: 40px; cursor: pointer; z-index: 2077; }
        .prev-btn { left: 20px; } .next-btn { right: 20px; }
        @media (max-width: 600px) { .book-layout { flex-direction: column; height: auto; max-height: 90vh; overflow-y: auto; } .book-left { height: 250px; } .nav-btn { width: 40px; font-size: 24px; } }

        @keyframes cardArrive { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .back-to-top { position: fixed; bottom: 25px; right: 25px; width: 48px; height: 48px; background: var(--card-bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(90, 70, 50, 0.2); z-index: 1001; opacity: 0; pointer-events: none; transition: 0.3s; }
        .back-to-top.visible { opacity: 1; pointer-events: auto; }
        .arrow-icon { width: 14px; height: 14px; border-top: 4px solid var(--text-accent); border-left: 4px solid var(--text-accent); transform: rotate(45deg) translate(2px, 2px); }
    </style>
</head>
<body class="mode-all">

    <header>
        <h1>Furniture Post</h1>
        <div class="top-controls">
            <input type="text" id="searchInput" class="search-input" placeholder="家具を検索..." oninput="render()">
            <div class="smooth-toggle" id="modeToggle" onclick="toggleMode()">
                <div class="slider"></div>
                <div class="toggle-label">新着順</div>
                <div class="toggle-label">パッチ別</div>
            </div>
        </div>
        <div class="filter-scroll" id="mainCategoryArea"></div>
        <div class="filter-scroll" id="subMenu"></div>
    </header>

    <main class="catalog-container">
        <div class="catalog-grid" id="grid"></div>
    </main>

    <div id="itemModal" class="modal">
        <button class="nav-btn prev-btn" onclick="prevItem()">&#10094;</button>
        <div class="modal-content book-layout">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div class="book-left">
                <div id="modalPhoto" class="main-photo"></div>
            </div>
            <div class="book-right">
                <div>
                    <h2 id="modalTitle" style="margin-top:0;">アイテム名</h2>
                    <div style="margin-bottom:15px;">
                        <span id="modalPatch" class="tag">Patch</span>
                        <span id="modalCategory" class="tag">カテゴリー</span>
                        <span id="modalGenre" class="tag">ジャンル</span>
                    </div>
                    <div class="spec-list">
                        <div class="spec-item"><span>染色</span><strong id="modalDye">-</strong></div>
                        <div class="spec-item"><span>マケボ</span><strong id="modalMarket">-</strong></div>
                        <div class="spec-item" id="modalRecipe">レシピ詳細：-</div>
                    </div>
                </div>
                <div>
                    <div class="material-info" id="modalMaterial" style="font-size:0.8rem; margin-top:10px;">材質：-</div>
                    <div class="comment-box" id="modalComment">備考なし</div>
                </div>
            </div>
        </div>
        <button class="nav-btn next-btn" onclick="nextItem()">&#10095;</button>
    </div>

    <a href="javascript:void(0)" class="back-to-top" id="topBtn" onclick="scrollToTop()">
        <span class="arrow-icon"></span>
    </a>

<script>
    let sampleData = [];      
    let currentCategory = 'all'; 
    let currentGenre = 'all';    
    let currentMode = 'all'; 
    let currentIndex = 0;      
    let displayList = [];

    const GAS_URL = "https://script.google.com/macros/s/AKfycbxW6Gx_zg8upPU10cK2gS9acqg_YRdc79lUzq2qUB0DsMJv0hV2OkCcttbIHoa1AqSemw/exec";

    window.onload = function() {
        fetch(GAS_URL)
            .then(response => response.json())
            .then(data => {
                // スプシのデータを日付（あるいはID）順の逆順（新着順）にして保持
                sampleData = data.reverse(); 
                createFilterButtons();
                render(); 
            })
            .catch(err => console.error("データ読み込みエラー:", err));
    };

    function toggleMode() {
        currentMode = (currentMode === 'all') ? 'patch' : 'all';
        document.body.className = 'mode-' + currentMode;
        render();
    }

    function createFilterButtons() {
        const mainArea = document.getElementById('mainCategoryArea');
        const categories = [...new Set(sampleData.map(item => item.category))].filter(c => c && c !== "‐" && c !== "×");
        mainArea.innerHTML = `<button class="filter-chip active" onclick="filterMain('all', this)">すべて</button>`;
        categories.forEach(cat => {
            mainArea.innerHTML += `<button class="filter-chip" onclick="filterMain('${cat}', this)">${cat}</button>`;
        });
    }

    function filterMain(cat, element) {
        currentCategory = cat;
        currentGenre = 'all'; 
        document.querySelectorAll('#mainCategoryArea .filter-chip').forEach(btn => btn.classList.remove('active'));
        if(element) element.classList.add('active');

        const sub = document.getElementById('subMenu');
        const relevantGenres = [...new Set(sampleData.filter(item => item.category === cat).map(item => item.genre))]
            .filter(g => g && g !== "×" && g !== "‐" && g !== "-" && g !== "");

        if (relevantGenres.length > 0 && cat !== 'all') {
            sub.innerHTML = '';
            relevantGenres.forEach(genre => {
                sub.innerHTML += `<button class="filter-chip" onclick="filterSub('${genre}', this)">${genre}</button>`;
            });
            sub.classList.add('visible');
            sub.style.display = 'flex';
        } else {
            sub.classList.remove('visible');
            sub.style.display = 'none';
        }
        render();
    }

    function filterSub(genre, element) {
        if(element.classList.contains('active')) {
            currentGenre = 'all';
            element.classList.remove('active');
        } else {
            currentGenre = genre;
            document.querySelectorAll('#subMenu .filter-chip').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
        }
        render();
    }

    function render() {
        const grid = document.getElementById('grid');
        const searchText = document.getElementById('searchInput').value.toLowerCase();
        grid.innerHTML = '';
        let lastPatch = "";

        // フィルタリング
        displayList = sampleData.filter(item => {
            const img = String(item.image || "");
            const hasImage = img !== "" && img !== "‐" && img !== "-";
            const categoryMatch = (currentCategory === 'all' || item.category === currentCategory);
            const genreMatch = (currentGenre === 'all' || item.genre === currentGenre);
            const nameMatch = (item.name || "").toLowerCase().includes(searchText);
            return hasImage && categoryMatch && genreMatch && nameMatch;
        });

        // 表示
        displayList.forEach((item, index) => {
            // パッチ別モードの時の仕切り
            if (currentMode === 'patch' && item.patch !== lastPatch) {
                const divider = document.createElement('div');
                divider.className = 'patch-divider';
                divider.innerHTML = `<span class="patch-label">Patch ${item.patch}</span>`;
                grid.appendChild(divider);
                lastPatch = item.patch;
            }

            const card = document.createElement('div');
            card.className = 'cheki-card';
            card.onclick = () => openModal(index);
            card.style.animationDelay = (index * 0.02) + 's';
            
            const seal = item.isNew ? '<div class="new-seal">New!</div>' : '';
            card.innerHTML = `
                ${seal}
                <div class="photo-area"><img src="${item.image}" loading="lazy"></div>
                <p class="item-name">${item.name}</p>
            `;
            grid.appendChild(card);
        });
    }

    function openModal(index) {
        currentIndex = index;
        updateModal();
        document.getElementById('itemModal').classList.add('visible');
        document.body.style.overflow = 'hidden';
    }
    function closeModal() {
        document.getElementById('itemModal').classList.remove('visible');
        document.body.style.overflow = 'auto';
    }
    function updateModal() {
        const item = displayList[currentIndex];
        if(!item) return;
        document.getElementById('modalTitle').innerText = item.name || "-";
        document.getElementById('modalPatch').innerText = "Patch " + (item.patch || "-");
        document.getElementById('modalCategory').innerText = item.category || "-";
        document.getElementById('modalGenre').innerText = item.genre || "-";
        document.getElementById('modalDye').innerText = item.dyeable || "不可";
        document.getElementById('modalMarket').innerText = item.market || "不可";
        document.getElementById('modalRecipe').innerText = "レシピ詳細：" + (item.recipe || "なし");
        document.getElementById('modalMaterial').innerText = "材質：" + (item.material || "-");
        document.getElementById('modalComment').innerText = item.remarks || "備考なし";
        document.getElementById('modalPhoto').innerHTML = `<img src="${item.image}">`;
    }
    function nextItem() { currentIndex = (currentIndex + 1) % displayList.length; updateModal(); }
    function prevItem() { currentIndex = (currentIndex - 1 + displayList.length) % displayList.length; updateModal(); }

    function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }
    window.onscroll = function() {
        const btn = document.getElementById('topBtn');
        btn.classList.toggle('visible', document.documentElement.scrollTop > 300);
    };

    // キーボード操作
    document.addEventListener('keydown', (e) => {
        if (!document.getElementById('itemModal').classList.contains('visible')) return;
        if (e.key === 'ArrowRight') nextItem();
        if (e.key === 'ArrowLeft') prevItem();
        if (e.key === 'Escape') closeModal();
    });
</script>
</body>
</html>
