<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Furniture Post for Eorzea</title>
    <style>
        /* --- 1. スタイル継承 & スライド用追加 --- */
        :root {
            --bg-color: #f0e1bd;
            --card-bg: #f5f5f5;
            --card-hover-bg: #ffffff;
            --text-main: #555555;
            --text-accent: #7d6b5d;
            --text-light: #888888;
            --color-new: #a4343a;
            --shadow: 0 8px 18px rgba(90, 70, 50, 0.15);
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            margin: 0;
            padding-top: 170px;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", sans-serif;
            color: var(--text-main);
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* --- ヘッダー・検索 --- */
        header {
            position: fixed; top: 0; left: 0; width: 100%;
            background-color: rgba(240, 225, 189, 0.96);
            backdrop-filter: blur(8px); z-index: 1000;
            padding: 10px 15px; box-shadow: 0 2px 10px rgba(90, 70, 50, 0.05);
            text-align: center;
        }
        header h1 { font-size: 1.1rem; color: var(--text-accent); margin: 0 0 8px 0; letter-spacing: 1px; }
        .top-controls { display: flex; align-items: center; gap: 8px; max-width: 500px; margin: 0 auto 10px; }
        .search-input {
            width: 100%; padding: 8px 15px; border-radius: 20px;
            border: 1px solid rgba(125, 107, 93, 0.2); background-color: var(--card-bg);
            outline: none; font-size: 17px; transition: 0.3s;
        }

        /* --- スライダー用スタイル --- */
        .photo-area { 
            position: relative; 
            width: 100%; 
            aspect-ratio: 1/1; 
            background-color: #ddd; 
            border-radius: 6px; 
            overflow: hidden; 
            margin-bottom: 8px; 
        }
        .slide-img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .slide-img.active {
            opacity: 1;
        }
        .slider-controls {
            display: flex;
            justify-content: center;
            gap: 4px;
            margin-bottom: 8px;
        }
        .slide-btn {
            background: rgba(125, 107, 93, 0.1);
            border: 1px solid rgba(125, 107, 93, 0.2);
            border-radius: 4px;
            font-size: 10px;
            color: var(--text-accent);
            cursor: pointer;
            padding: 2px 8px;
            transition: 0.2s;
        }
        .slide-btn:hover { background: var(--text-accent); color: white; }

        /* --- その他既存スタイル --- */
        .catalog-container { max-width: 1100px; margin: 0 auto; padding: 15px; }
        .catalog-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        @media (min-width: 600px) {
            .catalog-grid { grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 20px; }
            body { padding-top: 190px; }
        }

        .cheki-card {
            background-color: var(--card-bg); padding: 14px 14px 20px 14px;
            border-radius: 10px; box-shadow: var(--shadow);
            position: relative; transition: 0.3s;
            animation: cardArrive 0.6s ease forwards;
        }
        .cheki-card:hover { transform: translateY(-5px); background-color: var(--card-hover-bg); }
        .item-name { font-size: 0.8rem; font-weight: 600; text-align: center; color: var(--text-accent); margin: 0; cursor: pointer; }
        
        /* モーダル関連 */
        .modal {
            display: none; position: fixed; z-index: 2000;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            align-items: center; justify-content: center;
        }
        .modal.visible { display: flex; }
        .book-layout {
            display: flex; width: 95%; max-width: 850px; height: 500px;
            background: #fdfaf3; border-radius: 10px; overflow: hidden; position: relative;
        }
        .book-left { flex: 1.2; background: #1a1a1a; display: flex; align-items: center; justify-content: center; }
        .book-right { flex: 1; padding: 30px; border-left: 1px solid rgba(125,107,93,0.2); overflow-y: auto;}
        .close-modal { position: absolute; top: 10px; right: 20px; font-size: 30px; cursor: pointer; color: #555; }

        @keyframes cardArrive { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        /* フィルター等のスタイル（省略せず継承） */
        .filter-scroll { display: flex; overflow-x: auto; gap: 8px; padding: 5px 0; justify-content: center; }
        .filter-chip { padding: 6px 14px; background: rgba(125,107,93,0.18); border-radius: 15px; font-size: 0.7rem; cursor: pointer; border: none; }
        .filter-chip.active { background: var(--text-accent); color: white; }
    </style>
</head>
<body>

    <header>
        <h1>Furniture Post</h1>
        <div class="top-controls">
            <input type="text" id="searchInput" class="search-input" placeholder="家具を検索..." oninput="render()">
        </div>
        <div class="filter-scroll" id="mainCategoryArea"></div>
    </header>

    <main class="catalog-container">
        <div class="catalog-grid" id="grid"></div>
    </main>

    <div id="itemModal" class="modal">
        <div class="book-layout">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div class="book-left" id="modalPhoto"></div>
            <div class="book-right">
                <h2 id="modalTitle">アイテム名</h2>
                <p id="modalCategory"></p>
                <div id="modalComment" style="font-size: 0.9rem; color: #666;"></div>
            </div>
        </div>
    </div>

<script>
    let sampleData = [];      
    let displayList = [];
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxW6Gx_zg8upPU10cK2gS9acqg_YRdc79lUzq2qUB0DsMJv0hV2OkCcttbIHoa1AqSemw/exec";

    window.onload = function() {
        fetch(GAS_URL)
            .then(response => response.json())
            .then(data => {
                sampleData = data.reverse(); 
                createFilterButtons();
                render(); 
            });
    };

    function createFilterButtons() {
        const area = document.getElementById('mainCategoryArea');
        const categories = [...new Set(sampleData.map(item => item.category))].filter(c => c && c !== "‐");
        area.innerHTML = '<button class="filter-chip active" onclick="filterCat(\'all\', this)">すべて</button>';
        categories.forEach(cat => {
            area.innerHTML += `<button class="filter-chip" onclick="filterCat('${cat}', this)">${cat}</button>`;
        });
    }

    let currentCat = 'all';
    function filterCat(cat, el) {
        currentCat = cat;
        document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        render();
    }

    function render() {
        const grid = document.getElementById('grid');
        const search = document.getElementById('searchInput').value.toLowerCase();
        grid.innerHTML = '';

        displayList = sampleData.filter(item => {
            return (currentCat === 'all' || item.category === currentCat) && 
                   (item.name || "").toLowerCase().includes(search);
        });

        displayList.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'cheki-card';
            
            // 画像パスの作成（GitHubのimagesフォルダ内を参照）
            const fImg = `images/${item.name}_front.png`;
            const bImg = `images/${item.name}_back.png`;
            const bImg = `images/${item.name}_side.png`;
            const bImg = `images/${item.name}_bottom.png`;
            const bImg = `images/${item.name}_top.png`;

            card.innerHTML = `
                <div class="photo-area" onclick="openModal(${index})">
                    <img src="${fImg}" class="slide-img active" id="f-${index}" onerror="this.src='https://placehold.jp/24/cccccc/ffffff/200x200.png?text=No%20Image'">
                    <img src="${bImg}" class="slide-img" id="b-${index}" onerror="this.style.display='none'">
                </div>
                <div class="slider-controls">
                    <button class="slide-btn" onclick="changeImg(${index}, 'f')">Front</button>
                    <button class="slide-btn" onclick="changeImg(${index}, 'b')">Back</button>
                </div>
                <p class="item-name" onclick="openModal(${index})">${item.name}</p>
            `;
            grid.appendChild(card);
        });
    }

    // スライド切り替え魔法
    function changeImg(idx, side) {
        const f = document.getElementById(`f-${idx}`);
        const b = document.getElementById(`b-${idx}`);
        if(side === 'f') {
            f.classList.add('active'); b.classList.remove('active');
        } else {
            if(b.style.display !== 'none') {
                b.classList.add('active'); f.classList.remove('active');
            }
        }
    }

    function openModal(index) {
        const item = displayList[index];
        document.getElementById('modalTitle').innerText = item.name;
        document.getElementById('modalCategory').innerText = item.category;
        document.getElementById('modalComment').innerText = item.remarks || "備考なし";
        document.getElementById('modalPhoto').innerHTML = `<img src="images/${item.name}_front.jpg" style="max-width:100%; max-height:100%;" onerror="this.src='https://placehold.jp/200x200?text=NoImage'">`;
        document.getElementById('itemModal').classList.add('visible');
    }

    function closeModal() { document.getElementById('itemModal').classList.remove('visible'); }
</script>
</body>
</html>
